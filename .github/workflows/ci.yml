name: MERN CI Pipeline

on:
push:
branches:
- main
pull_request:
branches:
- main

jobs:
backend-test:
runs-on: ubuntu-latest

```
services:
  mongo:
    image: mongo
    ports:
      - 27017:27017

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 18

  - name: Install Backend Dependencies
    working-directory: ./backend
    run: npm install

  - name: Seed MongoDB
    working-directory: ./backend
    run: node seedTasksData.js

  - name: Run Backend Tests
    working-directory: ./backend
    run: npm test
```

frontend-build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 18

  - name: Install Frontend Dependencies
    working-directory: ./frontend
    run: npm install

  - name: Build Frontend
    working-directory: ./frontend
    run: npm run build
```

docker-build:
needs:
- backend-test
- frontend-build

```
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Build Docker Images
    run: docker compose build
```
